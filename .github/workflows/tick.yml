name: tick

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Advance one generation
        run: |
          curl -fsS -X POST "$TICK_URL/api/tick" \
            -H "X-Tick-Secret: $TICK_SECRET"
        env:
          TICK_URL: ${{ secrets.TICK_URL }}
          TICK_SECRET: ${{ secrets.TICK_SECRET }}
